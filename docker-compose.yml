services:
  cam-recorder:
    build: .
    container_name: wansview_k5_recorder
    restart: always
    network_mode: "host"
    environment:
      - RTSP_URL=rtsp://alex:qwerty@192.168.8.234:554/live/ch0
      - CAMERA_IP=192.168.8.234
      - MOTION_SENSITIVITY=500
      - OPENCV_FFMPEG_CAPTURE_OPTIONS=rtsp_transport;tcp|stimeout;5000000
    volumes:
      - /mnt/data/camera-stream:/recordings

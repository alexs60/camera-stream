services:
  cam-recorder:
    build: .
    container_name: wansview_k5_recorder
    restart: always
    network_mode: "host"
    env_file:
      - .env
    environment:
      - OPENCV_FFMPEG_CAPTURE_OPTIONS=rtsp_transport;tcp|stimeout;5000000
    volumes:
      - /mnt/data/camera-stream:/recordings

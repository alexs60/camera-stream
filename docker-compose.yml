services:
  cam-recorder:
    build: .
    container_name: cam_recorder
    restart: always
    network_mode: "host"
    env_file:
      - .env
    # tmpfs for the rolling segment ring buffer: cheap, no disk wear.
    # Size scales with camera count and segment retention; 256m is plenty
    # for a handful of cameras at typical bitrates.
    tmpfs:
      - /tmp/cam-segments:size=256m
    volumes:
      - /mnt/data/camera-stream:/recordings
    # Give the supervisor time to flush its in-flight clip on `docker stop`.
    stop_grace_period: 60s
